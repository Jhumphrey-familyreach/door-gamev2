<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pick a Door with Reach</title>
  <style>
    :root {
      --sky-top: #7fd3ff;
      --sky-bottom: #eaf9ff;
      --grass: #68bd59;
      --grass-dark: #4d9d43;
      --door: #a8572a;
      --door-dark: #713918;
      --trim: #f4e6c7;
      --shadow: rgba(24, 39, 45, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(var(--sky-top), var(--sky-bottom) 68%, var(--grass) 68%);
      color: #173042;
      user-select: none;
    }

    .cloud {
      position: absolute;
      width: 120px;
      height: 38px;
      background: rgba(255,255,255,.85);
      border-radius: 999px;
      filter: drop-shadow(0 5px 5px rgba(0,0,0,.08));
    }
    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }
    .cloud::before { width: 55px; height: 55px; left: 18px; top: -27px; }
    .cloud::after { width: 72px; height: 72px; right: 10px; top: -37px; }
    .cloud.one { top: 70px; left: 8%; }
    .cloud.two { top: 120px; right: 7%; transform: scale(.8); opacity: .8; }

    .game-shell {
      width: min(1200px, 96vw);
      height: min(760px, 94vh);
      margin: 3vh auto;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      z-index: 5;
      text-shadow: 0 2px 0 rgba(255,255,255,.7);
    }

    .family-reach-logo {
      display: block;
      width: min(250px, 36vw);
      max-height: 120px;
      object-fit: contain;
      margin: 0 auto 8px;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,.14));
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.04em;
      color: #080852;
    }

    .reach-word {
      color: #FF3300;
    }

    .subtitle {
      margin: .35rem 0 0;
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 700;
    }

    .stage {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 510px;
      margin-top: 12px;
    }

    .ground-shadow {
      position: absolute;
      left: 5%;
      right: 3%;
      bottom: 5%;
      height: 18%;
      border-radius: 50%;
      background: rgba(44, 91, 41, .15);
      filter: blur(12px);
    }

    .doors {
      position: absolute;
      left: 31%;
      right: 3%;
      bottom: 10%;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      gap: clamp(18px, 3vw, 44px);
    }

    .door-wrap {
      width: min(210px, 19vw);
      height: min(380px, 48vw);
      min-width: 145px;
      min-height: 280px;
      position: relative;
      perspective: 1100px;
      cursor: pointer;
      outline: none;
    }

    .door-frame {
      position: absolute;
      inset: 0;
      background: var(--trim);
      border-radius: 12px 12px 5px 5px;
      box-shadow: 0 18px 28px var(--shadow), inset 0 0 0 5px rgba(90,60,30,.12);
    }

    .reveal {
      position: absolute;
      inset: 15px;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      display: grid;
      place-items: center;
      padding: 8px;
      cursor: zoom-in;
      transition: transform .35s ease, box-shadow .35s ease;
      box-shadow: inset 0 0 20px rgba(0,0,0,.12);
    }

    .reveal img {
      width: 100%;
      height: auto;
      max-height: 100%;
      object-fit: contain;
      background: #fff;
      border-radius: 4px;
    }

    .door-wrap.open .reveal {
      transform: translateY(-8px) scale(1.05);
      box-shadow: 0 18px 32px rgba(0,0,0,.28), inset 0 0 18px rgba(0,0,0,.08);
    }

    .door {
      position: absolute;
      inset: 15px;
      transform-origin: left center;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(.23,.79,.25,1);
      border-radius: 4px;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08), transparent 22%, rgba(0,0,0,.06) 72%, rgba(255,255,255,.08)),
        var(--door);
      box-shadow:
        inset 0 0 0 5px var(--door-dark),
        inset 0 0 0 11px rgba(255,255,255,.08),
        7px 8px 12px rgba(0,0,0,.25);
      z-index: 2;
      backface-visibility: hidden;
    }

    .door::before,
    .door::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      height: 30%;
      border: 5px solid var(--door-dark);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.08);
    }

    .door::before { top: 10%; }
    .door::after { bottom: 10%; }

    .knob {
      position: absolute;
      top: 50%;
      right: 12%;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff1a1, #d49a1d 55%, #8d5d00);
      box-shadow: 0 2px 4px rgba(0,0,0,.35);
      z-index: 3;
    }

    .number {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 1.45rem;
      background: #ffe890;
      border: 4px solid #7b5311;
      z-index: 4;
      box-shadow: 0 4px 0 rgba(0,0,0,.12);
    }

    .door-wrap.open .door {
      transform: rotateY(-104deg);
    }

    .door-wrap.disabled {
      cursor: default;
      pointer-events: none;
    }

    .dog {
      --dog-scale: 1;
      position: absolute;
      left: 3%;
      bottom: 9%;
      width: 180px;
      height: 190px;
      transform: translateX(0) scale(var(--dog-scale));
      transform-origin: bottom center;
      z-index: 10;
      transition: transform 1.05s cubic-bezier(.2,.8,.2,1);
      filter: drop-shadow(0 12px 6px rgba(0,0,0,.18));
    }

    .dog.running {
      animation: bounceRun .24s infinite alternate;
    }

    @keyframes bounceRun {
      from { margin-bottom: 0; }
      to { margin-bottom: 10px; }
    }

    .dog-body {
      position: absolute;
      width: 105px;
      height: 88px;
      left: 48px;
      bottom: 28px;
      background: #8b4a22;
      border-radius: 52% 48% 45% 42%;
      transform: rotate(-5deg);
      box-shadow: inset -10px -10px 0 rgba(96,44,15,.14);
    }

    .dog-head {
      position: absolute;
      width: 95px;
      height: 92px;
      left: 18px;
      top: 35px;
      background: #9a5327;
      border-radius: 48% 48% 46% 42%;
      box-shadow: inset -8px -8px 0 rgba(96,44,15,.12);
    }

    .ear {
      position: absolute;
      width: 38px;
      height: 68px;
      top: 25px;
      background: #7b421f;
      border-radius: 60% 35% 70% 45%;
      z-index: -1;
    }
    .ear.left { left: 15px; transform: rotate(18deg); }
    .ear.right { left: 76px; transform: rotate(-22deg); }

    .eye {
      position: absolute;
      top: 63px;
      width: 12px;
      height: 15px;
      background: #1e211f;
      border-radius: 50%;
    }
    .eye.left { left: 47px; }
    .eye.right { left: 82px; }

    .eye::after {
      content: "";
      position: absolute;
      width: 4px;
      height: 4px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: white;
    }

    .muzzle {
      position: absolute;
      width: 54px;
      height: 40px;
      left: 50px;
      top: 83px;
      background: #f3c790;
      border-radius: 50%;
    }

    .nose {
      position: absolute;
      width: 22px;
      height: 16px;
      left: 16px;
      top: 1px;
      background: #20211f;
      border-radius: 55% 55% 45% 45%;
    }

    .smile {
      position: absolute;
      left: 20px;
      top: 16px;
      width: 22px;
      height: 13px;
      border-bottom: 3px solid #4a2c1b;
      border-radius: 50%;
    }

    .leg {
      position: absolute;
      width: 25px;
      height: 58px;
      background: #7a411f;
      border-radius: 14px;
      bottom: 5px;
    }
    .leg.one { left: 58px; }
    .leg.two { left: 112px; }
    .leg.three { left: 133px; opacity: .9; }

    .paw {
      position: absolute;
      bottom: 0;
      left: -4px;
      width: 34px;
      height: 14px;
      background: #e7b477;
      border-radius: 50% 50% 40% 40%;
    }

    .tail {
      position: absolute;
      width: 72px;
      height: 32px;
      right: 0;
      bottom: 80px;
      border: 17px solid #8b4a22;
      border-left: 0;
      border-bottom-color: transparent;
      border-radius: 0 80% 0 0;
      transform: rotate(18deg);
      transform-origin: left center;
      animation: wag .35s infinite alternate ease-in-out;
      z-index: -1;
    }

    @keyframes wag {
      from { transform: rotate(6deg); }
      to { transform: rotate(34deg); }
    }

    .message {
      position: absolute;
      left: 1%;
      bottom: 2%;
      width: 230px;
      text-align: center;
      font-weight: 900;
      font-size: 1.08rem;
      background: rgba(255,255,255,.9);
      border: 4px solid rgba(68,92,50,.25);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 7px 15px rgba(0,0,0,.12);
      z-index: 20;
    }

    .reset {
      position: absolute;
      right: 3%;
      top: 2%;
      z-index: 30;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 900;
      font-size: 1rem;
      color: white;
      background: #2a7c4f;
      cursor: pointer;
      box-shadow: 0 5px 0 #155b36;
      transition: transform .15s, box-shadow .15s;
    }

    .reset:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #155b36; }
    .reset:active { transform: translateY(3px); box-shadow: 0 2px 0 #155b36; }

    .sparkle {
      position: absolute;
      pointer-events: none;
      font-size: 1.6rem;
      animation: pop 1s ease-out forwards;
      z-index: 50;
    }

    @keyframes pop {
      0% { opacity: 0; transform: translateY(15px) scale(.2) rotate(0); }
      25% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-90px) scale(1.3) rotate(180deg); }
    }


    .image-modal {
      position: fixed;
      inset: 0;
      background: rgba(12, 18, 28, .62);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 200;
      backdrop-filter: blur(3px);
    }

    .image-modal.show {
      display: flex;
    }

    .modal-card {
      position: relative;
      width: min(1100px, 92vw);
      max-height: 88vh;
      background: white;
      border-radius: 18px;
      padding: 18px 18px 14px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      animation: modalPop .28s ease-out;
    }

    @keyframes modalPop {
      from { opacity: 0; transform: scale(.88) translateY(22px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-image-wrap {
      width: 100%;
      max-height: calc(88vh - 90px);
      overflow: auto;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid rgba(23,48,66,.12);
    }

    .modal-image-wrap img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      background: white;
      image-rendering: auto;
    }

    .modal-caption {
      margin-top: 10px;
      font-weight: 800;
      text-align: center;
      color: #173042;
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 999px;
      background: #173042;
      color: white;
      font-size: 1.35rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,.2);
    }


    .winner-banner {
      position: fixed;
      left: 50%;
      top: 16%;
      transform: translate(-50%, -50%) scale(.5);
      opacity: 0;
      z-index: 260;
      pointer-events: none;
      padding: 18px 30px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff4a8, #ffd54f);
      border: 5px solid #a56d00;
      color: #4f3200;
      font-size: clamp(1.5rem, 4vw, 3.2rem);
      font-weight: 1000;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0,0,0,.3);
      text-shadow: 0 2px 0 rgba(255,255,255,.65);
    }

    .winner-banner.show {
      animation: winnerBanner 2.8s ease-out forwards;
    }

    @keyframes winnerBanner {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.5) rotate(-4deg); }
      14% { opacity: 1; transform: translate(-50%, -50%) scale(1.12) rotate(2deg); }
      25%, 78% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0); }
      100% { opacity: 0; transform: translate(-50%, -62%) scale(.95); }
    }

    .confetti-piece {
      position: fixed;
      top: -30px;
      width: 13px;
      height: 22px;
      border-radius: 3px;
      z-index: 250;
      pointer-events: none;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translate3d(0, -30px, 0) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--drift), 110vh, 0) rotate(var(--spin));
      }
    }

    .winner-burst {
      position: fixed;
      left: 50%;
      top: 48%;
      z-index: 245;
      pointer-events: none;
      font-size: 2rem;
      animation: winnerBurst 1.4s ease-out forwards;
    }

    @keyframes winnerBurst {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.2); }
      25% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(
          calc(-50% + var(--burst-x)),
          calc(-50% + var(--burst-y))
        ) scale(1.5) rotate(var(--burst-r));
      }
    }

    @media (max-width: 800px) {
      .stage { min-height: 560px; }
      .doors {
        left: 8%;
        right: 4%;
        bottom: 15%;
        gap: 10px;
      }
      .door-wrap {
        min-width: 95px;
        width: 28vw;
        min-height: 225px;
        height: 55vw;
      }
      .dog {
        --dog-scale: .72;
        left: -4%;
        bottom: 3%;
      }
      .message {
        width: 180px;
        font-size: .9rem;
        left: 1%;
        bottom: 0;
      }
      .reset {
        top: 1%;
        right: 1%;
        padding: 9px 13px;
      }
    }
  
    /* Family Reach Financial Resource Center-inspired theme */
    :root {
      --fr-navy: #080852;
      --fr-orange: #FF3300;
      --fr-cream: #FFF8F2;
      --fr-sky: #EAF6F8;
      --fr-soft-blue: #DCEFF2;
      --fr-yellow: #FFD66B;
      --fr-ink: #080852;
      --door: #080852;
      --door-dark: #050536;
      --trim: #FFFFFF;
      --shadow: rgba(8, 8, 82, .18);
    }

    body {
      overflow: auto;
      color: var(--fr-ink);
      background: linear-gradient(180deg, #F7F9FC 0%, #EEF3F7 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: none;
      z-index: -1;
    }

    .cloud {
      display: none;
    }

    .game-shell {
      width: min(1280px, 96vw);
      height: auto;
      min-height: 94vh;
      margin: 2vh auto;
      padding: 0 0 22px;
    }

    header {
      width: min(1020px, 94%);
      padding: 18px 28px 20px;
      border-radius: 0 0 32px 32px;
      background: rgba(255, 255, 255, .96);
      box-shadow: 0 12px 35px rgba(8, 8, 82, .10);
      border-top: 7px solid var(--fr-orange);
      text-shadow: none;
    }

    .family-reach-logo {
      width: min(215px, 34vw);
      max-height: 96px;
      margin-bottom: 6px;
      filter: none;
    }

    h1 {
      font-size: clamp(2rem, 4.6vw, 4rem);
      color: var(--fr-navy);
      line-height: 1;
    }

    .reach-word {
      color: var(--fr-orange);
    }

    .subtitle {
      color: var(--fr-navy);

      opacity: .82;
      margin-top: .7rem;
    }

    .stage {
      width: min(1180px, 96%);
      min-height: 535px;
      margin-top: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, #FFFFFF 0%, #F5F8FB 100%);
      box-shadow: 0 18px 44px rgba(8, 8, 82, .12);
      border: 1px solid rgba(8, 8, 82, .08);
      overflow: hidden;
    }

    .stage::before {
      content: "CLEARER DONOR RECORDS START WITH BETTER OPPORTUNITY NAMES.";
      position: absolute;
      top: 26px;
      left: 34px;
      max-width: 340px;
      color: var(--fr-navy);
      font-weight: 900;
      font-size: clamp(.82rem, 1.45vw, 1.08rem);
      line-height: 1.35;
      letter-spacing: .08em;
      opacity: .86;
    }

    .stage::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 10px;
      background: linear-gradient(90deg, var(--fr-navy), var(--fr-orange));
      opacity: .9;
    }

    .ground-shadow {
      left: 3%;
      right: 2%;
      bottom: 4%;
      background: rgba(8, 8, 82, .09);
    }

    .doors {
      left: 30%;
      right: 4%;
      bottom: 9%;
      z-index: 4;
    }

    .door-wrap {
      border-radius: 18px;
      transition: transform .22s ease, filter .22s ease;
    }

    .door-wrap:not(.open):hover {
      transform: translateY(-8px);
      filter: drop-shadow(0 16px 16px rgba(8, 8, 82, .18));
    }

    .door-frame {
      background: #FFFFFF;
      border-radius: 20px 20px 8px 8px;
      box-shadow:
        0 18px 30px rgba(8, 8, 82, .18),
        inset 0 0 0 3px rgba(8, 8, 82, .05);
    }

    .reveal {
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 0 2px rgba(8, 8, 82, .06);
    }

    .door {
      border-radius: 12px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.08), transparent 38%),
        var(--fr-navy);
      box-shadow:
        inset 0 0 0 5px #050536,
        inset 0 0 0 11px rgba(255,255,255,.08),
        7px 10px 18px rgba(8, 8, 82, .28);
    }

    .door::before,
    .door::after {
      border-color: rgba(255,255,255,.5);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.06);
    }

    .number {
      background: var(--fr-orange);
      color: #FFFFFF;
      border-color: #FFFFFF;
      box-shadow: 0 5px 0 rgba(5,5,54,.32);
    }

    .knob {
      background: radial-gradient(circle at 35% 30%, #fff8d1, #ffd66b 55%, #ba7600);
    }

    .message {
      left: 2%;
      bottom: 3%;
      width: 245px;
      color: #FFFFFF;
      background: var(--fr-navy);
      border: 0;
      border-left: 8px solid var(--fr-orange);
      border-radius: 18px;
      padding: 14px 16px;
      box-shadow: 0 12px 26px rgba(8, 8, 82, .24);
    }

    .reset {
      right: 3%;
      top: 3%;
      color: #FFFFFF;
      background: var(--fr-orange);
      box-shadow: 0 5px 0 #B92500;
    }

    .reset:hover {
      box-shadow: 0 7px 0 #B92500;
    }

    .reset:active {
      box-shadow: 0 2px 0 #B92500;
    }

    .dog {
      filter: drop-shadow(0 12px 7px rgba(8,8,82,.20));
    }

    .modal-card {
      border-top: 8px solid var(--fr-orange);
      box-shadow: 0 28px 70px rgba(8,8,82,.38);
    }

    .modal-caption {
      color: var(--fr-navy);
    }

    .modal-close {
      background: var(--fr-navy);
    }

    .winner-banner {
      background: linear-gradient(135deg, #FFFFFF, #FFD66B);
      border-color: var(--fr-orange);
      color: var(--fr-navy);
    }

    @media (max-width: 800px) {
      body {
        background: linear-gradient(180deg, #F7F9FC 0%, #EEF3F7 100%);
      }

      header {
        width: 96%;
        padding-inline: 14px;
      }

      .stage {
        width: 98%;
        min-height: 590px;
      }

      .stage::before {
        left: 18px;
        top: 18px;
      }

      .doors {
        left: 6%;
        right: 3%;
      }

      .message {
        width: 190px;
      }
    }

  </style>
</head>
<body>
  <div class="cloud one"></div>
  <div class="cloud two"></div>

  <div class="winner-banner" id="winnerBanner">🏆 NPSP Best Practice 🏆</div>

    const revealSequence = [
      {
        title: "In-Kind Gift: Franklin Sports - 2026 YP Pickleball Tournament",
        img: doorWraps[0].querySelector(".reveal img").src,
        alt: "In-Kind Gift: Franklin Sports - 2026 YP Pickleball Tournament",
        winner: false
      },
      {
        title: "$125.00 Donation for Zoe Davidson on 06/09/2026",
        img: doorWraps[1].querySelector(".reveal img").src,
        alt: "$125.00 Donation for Zoe Davidson on 06/09/2026",
        winner: false
      },
      {
        title: "Donation - Grace Brown - 06/09/2026 - $125.00",
        img: doorWraps[2].querySelector(".reveal img").src,
        alt: "Donation - Grace Brown - 06/09/2026 - $125.00",
        winner: true
      }
    ];

    function assignRevealToDoor(door, revealData) {
      const img = door.querySelector(".reveal img");
      img.src = revealData.img;
      img.alt = revealData.alt;
      door.dataset.title = revealData.title;
      door.dataset.winner = revealData.winner ? "true" : "false";
    }

    function initializeDoorImages() {
      // Start all doors with a neutral placeholder so the winner can appear last
      // no matter which door is opened first.
      doorWraps.forEach((door, index) => {
        const img = door.querySelector(".reveal img");
        img.alt = "Hidden donor record naming example";
        door.dataset.title = "Hidden donor record naming example";
        door.dataset.winner = "false";

        img.src = "data:image/svg+xml," + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="500" height="800">
            <rect width="500" height="800" rx="22" fill="#ffffff"/>
            <rect x="28" y="28" width="444" height="744" rx="18" fill="#f5f8fb" stroke="#d9e4ef"/>
            <text x="250" y="290" text-anchor="middle" font-family="Arial" font-size="34" font-weight="700" fill="#080852">
              Door ${index + 1}
            </text>
            <text x="250" y="350" text-anchor="middle" font-family="Arial" font-size="24" fill="#5a6785">
              Click to reveal
            </text>
            <text x="250" y="385" text-anchor="middle" font-family="Arial" font-size="24" fill="#5a6785">
              the donor record
            </text>
            <circle cx="250" cy="505" r="56" fill="#FF3300" opacity=".12"/>
            <path d="M224 505 L243 524 L279 486" fill="none" stroke="#FF3300" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `);
      });
    }

    function getDogTravelX(targetDoor) {
      const stage = document.getElementById("stage");
      const stageRect = stage.getBoundingClientRect();
      const doorRect = targetDoor.getBoundingClientRect();
      const dogStartCenter = dog.offsetLeft + dog.offsetWidth / 2;
      const targetInsideStage =
        doorRect.left - stageRect.left + Math.min(35, doorRect.width * .18);

      return targetInsideStage - dogStartCenter;
    }

    function addSparkles(target) {
      const rect = target.getBoundingClientRect();
      const stageRect = document.getElementById("stage").getBoundingClientRect();

      for (let i = 0; i < 12; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        sparkle.textContent = ["✨","⭐","🐾"][Math.floor(Math.random() * 3)];
        sparkle.style.left = `${rect.left - stageRect.left + Math.random() * rect.width}px`;
        sparkle.style.top = `${rect.top - stageRect.top + 40 + Math.random() * rect.height * .55}px`;
        sparkle.style.animationDelay = `${Math.random() * .25}s`;
        document.getElementById("stage").appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1400);
      }
    }

    function celebrateWinner() {
      const colors = ["#ff4d4d", "#ffd84d", "#4dd2ff", "#7ee081", "#c77dff", "#ff8ad8"];

      winnerBanner.classList.remove("show");
      void winnerBanner.offsetWidth;
      winnerBanner.classList.add("show");

      for (let i = 0; i < 85; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = `${2.4 + Math.random() * 2.2}s`;
        piece.style.animationDelay = `${Math.random() * .45}s`;
        piece.style.setProperty("--drift", `${-180 + Math.random() * 360}px`);
        piece.style.setProperty("--spin", `${360 + Math.random() * 1080}deg`);
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5200);
      }

      for (let i = 0; i < 24; i++) {
        const burst = document.createElement("div");
        burst.className = "winner-burst";
        burst.textContent = ["✨", "⭐", "🎉", "🐾"][Math.floor(Math.random() * 4)];
        const angle = (Math.PI * 2 * i) / 24;
        const distance = 90 + Math.random() * 260;
        burst.style.setProperty("--burst-x", `${Math.cos(angle) * distance}px`);
        burst.style.setProperty("--burst-y", `${Math.sin(angle) * distance}px`);
        burst.style.setProperty("--burst-r", `${-180 + Math.random() * 360}deg`);
        burst.style.animationDelay = `${Math.random() * .18}s`;
        document.body.appendChild(burst);
        setTimeout(() => burst.remove(), 1800);
      }
    }

    function openModalForDoor(door) {
      const img = door.querySelector(".reveal img");
      modalImg.src = img.src;
      modalImg.alt = img.alt;
      modalCaption.textContent = door.dataset.title || img.alt || "Revealed image";
      imageModal.classList.add("show");
      imageModal.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      imageModal.classList.remove("show");
      imageModal.setAttribute("aria-hidden", "true");
    }

    function chooseDoor(index) {
      const target = doorWraps[index];
      if (busy || target.classList.contains("open")) return;
      busy = true;

      const travelX = getDogTravelX(target);
      message.textContent = `🐶 Reach is heading to door ${index + 1}!`;
      dog.classList.add("running");
      dog.style.transform = `translateX(${travelX}px) scale(var(--dog-scale))`;

      setTimeout(() => {
        dog.classList.remove("running");
        message.textContent = "🐾 Reach is opening the door...";
        dog.style.transform = `translateX(${travelX + 12}px) scale(var(--dog-scale)) rotate(-5deg)`;
      }, 1050);

      setTimeout(() => {
        const revealData = revealSequence[revealCount];
        assignRevealToDoor(target, revealData);
        revealCount += 1;

        target.classList.add("open");
        addSparkles(target);

        if (revealData.winner) {
          message.textContent = "🏆 NPSP Best Practice";
          celebrateWinner();
        } else {
          message.textContent = `📋 Door ${index + 1} is open! Pick another door.`;
        }

        openModalForDoor(target);
      }, 1450);

      setTimeout(() => {
        busy = false;
      }, 2400);
    }

    doorWraps.forEach((door, index) => {
      door.addEventListener("click", () => {
        if (door.classList.contains("open")) {
          openModalForDoor(door);
        } else {
          chooseDoor(index);
        }
      });

      door.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (door.classList.contains("open")) {
            openModalForDoor(door);
          } else {
            chooseDoor(index);
          }
        }
      });
    });

    modalClose.addEventListener("click", closeModal);
    imageModal.addEventListener("click", (e) => {
      if (e.target === imageModal) closeModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    resetBtn.addEventListener("click", () => {
      busy = false;
      revealCount = 0;
      doorWraps.forEach(door => {
        door.classList.remove("open", "disabled");
      });
      initializeDoorImages();
      closeModal();
      winnerBanner.classList.remove("show");
      dog.classList.remove("running");
      dog.style.transform = "translateX(0) scale(var(--dog-scale))";
      message.textContent = "🐾 Reach is ready — pick any door!";
    });

    initializeDoorImages();
  </script>
</body>
</html>
